  <meta charset="UTF-8">

  <title>Odyssey Checklist</title>
  <style>
    /* ============================================================
       ODYSSEY CHECKLIST  –  ver.01  2026.03
    ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

    :root {
      --navy:   #1a365d;
      --navy-md:#2a4a7f;
      --sky:    #4299e1;
      --mint:   #c6f6d5;
      --green:  #38a169;
      --amber:  #f6ad55;
      --amber-bg:#fff8ee;
      --life-bg:#f0faf4;
      --work-bg:#f7faff;
      --border: #d6e4f0;
      --text:   #2d3748;
      --muted:  #718096;
      --done-bg:#d4edda;
      --done-txt:#276749;
      --white:  #ffffff;
      --bg:     #eef2f7;
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      padding: 12px 16px 30px;
    }

    /* ─── 전체화면 로그인 오버레이 ──────────── */
    #loginOverlay {
      display: flex;
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #1a365d 0%, #2a4a7f 50%, #1a365d 100%);
      align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 36px 40px 32px;
      width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .login-logo { font-size: 32px; margin-bottom: 4px; }
    .login-title {
      font-size: 18px; font-weight: 700; color: var(--navy);
      margin-bottom: 2px; letter-spacing: -0.3px;
    }
    .login-sub { font-size: 11px; color: var(--muted); margin-bottom: 24px; }
    .login-field {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit;
      margin-bottom: 10px; outline: none;
      transition: border-color 0.2s;
    }
    .login-field:focus { border-color: var(--sky); }
    .login-btns { display: flex; gap: 8px; margin-top: 4px; }
    .btn-login-full {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login-full:hover { opacity: 0.88; }
    .btn-login-main  { background: var(--navy);  color: #fff; }
    .btn-signup-main { background: var(--green); color: #fff; }
    .login-msg { font-size: 11px; margin-top: 10px; min-height: 16px; }

    /* ─── HEADER ─────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .app-title { font-size: 20px; font-weight: 700; color: var(--navy); letter-spacing: -0.5px; }
    .app-date  { font-size: 11px; color: var(--muted); }
    .auth-area { display: flex; align-items: center; gap: 6px; }
    .btn-sm {
      padding: 5px 10px; border: none; border-radius: var(--radius);
      cursor: pointer; font-size: 11px; font-weight: 600;
    }
    .btn-logout { background: #e53e3e; color: #fff; }
    .user-info  { display: none; align-items: center; gap: 8px; font-size: 11px; }

    /* ─── CARD ───────────────────────────────── */
    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card-header {
      background: var(--navy);
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .card-body { padding: 10px 12px; }

    /* ─── ODYSSEY PLAN ───────────────────────── */
    /* 전체 레이아웃: 라벨(64px) + 5열 균등 */
    .od-row {
      display: grid;
      grid-template-columns: 64px repeat(5, 1fr);
      align-items: stretch;
      margin-bottom: 5px;
    }
    .od-row-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-align: right; padding-right: 8px;
      display: flex; align-items: center; justify-content: flex-end;
      line-height: 1.3;
    }
    .od-cell { padding: 0 3px; }
    .mission-chip {
      display: block;
      background: var(--work-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 11px;
      height: 100%;
      box-sizing: border-box;
    }
    .mission-chip .chip-label {
      font-size: 9px; font-weight: 700; color: var(--sky);
      display: block; margin-bottom: 1px;
    }
    .mission-chip.personal { background: var(--life-bg); }
    .mission-chip.personal .chip-label { color: var(--green); }

    /* ─── WORKING TARGET ─────────────────────── */
    .target-list { list-style: none; }
    .target-list li {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 3px 0;
      border-bottom: 1px dashed var(--border);
    }
    .target-list li:last-child { border-bottom: none; }
    .target-num {
      font-size: 10px; font-weight: 700; color: var(--sky);
      min-width: 16px;
    }
    .target-text { font-size: 11px; line-height: 1.5; }

    /* ─── WEEKLY CHECKLIST ───────────────────── */
    .checklist-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px;
      background: var(--navy);
      color: #fff;
    }
    .checklist-title { font-size: 13px; font-weight: 700; }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-nav button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 2px 10px;
      border-radius: 4px; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    .week-nav button:hover { background: rgba(255,255,255,0.3); }
    .week-label { font-size: 15px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .week-dates { font-size: 10px; color: rgba(255,255,255,0.7); }

    /* Core Task Panel */
    .core-task-wrapper {
      background: var(--amber-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .core-task-label {
      font-size: 10px; font-weight: 700; color: var(--navy);
      min-width: 70px; padding-top: 6px;
      text-align: center; line-height: 1.3;
    }
    .core-task-grid {
      flex: 1;
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }
    .core-task-item {
      display: flex; align-items: center; gap: 6px;
    }
    .core-task-name {
      font-size: 11px; font-weight: 700; color: var(--navy-md);
      min-width: 80px; white-space: nowrap;
    }
    .core-task-input {
      flex: 1; border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 6px;
      font-size: 11px; background: var(--white);
      font-family: 'IBM Plex Sans KR', sans-serif;
    }
    .core-task-input:focus { outline: none; border-color: var(--sky); }
    .btn-update {
      background: #e6b800; color: #5a3e00;
      border: none; border-radius: 4px;
      padding: 6px 12px; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
      align-self: center;
    }
    .btn-update:hover { background: #f0c800; }
    .btn-update.saved { background: var(--green); color: #fff; }

    /* ─── ROUTINE TABLE ──────────────────────── */
    .routine-table-wrap { overflow-x: auto; }
    .routine-table {
      width: 100%; border-collapse: collapse;
      table-layout: fixed;
    }
    .routine-table th {
      background: var(--navy);
      color: #fff; font-size: 11px; font-weight: 600;
      text-align: center; padding: 5px 3px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .routine-table th.today-hdr { background: var(--sky); }
    .routine-table th.weekend-hdr { background: var(--navy-md); }

    /* section-label 컬럼 */
    .routine-table td.section-label {
      font-size: 10px; font-weight: 700;
      color: var(--muted); text-align: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 4px 2px;
      border: none;
      border-right: 1px solid var(--border);
      width: 20px;
    }
    .routine-table tr.life1-row td.section-label { background: #edfaf3; color: var(--green); }
    .routine-table tr.work-row td.section-label  { background: #eef4ff; color: var(--navy-md); }
    .routine-table tr.life2-row td.section-label { background: #edfaf3; color: var(--green); }

    /* 태스크 셀: 테두리 없애고 좌우 컬럼 경계만 가볍게 */
    .routine-table td.task-cell {
      vertical-align: top;
      padding: 3px 4px;
      border: none;
      border-right: 1px solid rgba(200,215,230,0.5);
    }
    /* 그룹별 배경색 */
    .routine-table tr.life1-row td.task-cell { background: #f4fcf7; }
    .routine-table tr.work-row  td.task-cell { background: #f5f8ff; }
    .routine-table tr.life2-row td.task-cell { background: #f4fcf7; }
    /* 오늘 날짜: 왼쪽 테두리만 강조 */
    .routine-table td.task-cell.today-col    {
      border-left: 2px solid var(--sky) !important;
      background: rgba(235,248,255,0.7) !important;
    }
    .routine-table td.section-label.today-col { border-left: 2px solid var(--sky) !important; }
    /* 주말 */
    .routine-table td.task-cell.weekend-col  { background: #fffbf0 !important; }

    /* 그룹 간 행 경계: life1→work, work→life2 구분선 */
    .routine-table tr.work-row td {
      border-top: 1px solid rgba(180,200,220,0.4);
    }
    .routine-table tr.life2-row td {
      border-top: 1px solid rgba(180,200,220,0.4);
    }

    /* 통합 카운터 행 */
    .routine-table tr.counter-row td {
      background: var(--white);
      border: none;
      border-top: 1px solid var(--border);
      border-right: 1px solid rgba(200,215,230,0.5);
      text-align: center;
      padding: 3px 2px 4px;
    }
    .day-total-counter {
      font-size: 11px; font-weight: 700;
      color: var(--navy-md);
    }
    .day-total-counter.full { color: var(--green); }

    /* Task items */
    .task-item {
      display: flex; align-items: center; gap: 3px;
      padding: 2px 3px; border-radius: 3px;
      cursor: pointer; transition: all 0.15s;
      font-size: 11px; line-height: 1.3;
      color: var(--text);
    }
    .task-item:hover { background: rgba(66,153,225,0.1); border-radius: 3px; }
    .task-item.done {
      text-decoration: line-through;
      background: var(--done-bg);
      color: var(--done-txt);
      opacity: 0.75;
    }
    .task-num { font-size: 9px; color: var(--muted); min-width: 12px; }
    .task-name { flex: 1; }
    .task-time { font-size: 9px; color: var(--muted); }

    /* weekly progress bar */
    .progress-bar-wrap {
      padding: 5px 12px;
      background: var(--work-bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .progress-bar-bg {
      flex: 1; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--green);
      border-radius: 3px; transition: width 0.4s ease;
    }
    .progress-text { font-size: 10px; color: var(--muted); white-space: nowrap; }

    @media (max-width: 768px) {
      .core-task-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

const START_DATE = new Date(2025, 11, 28); // 2025-12-28 (일) = W01 시작 (12/29~1/3이 W01)
</script>

<!-- ─── 본문 (로그인 후 표시) ──────────────────────────────── -->

<!-- ─── ODYSSEY PLAN ────────────────────────────────────── -->
<div class="card">
  <div class="card-header">🚀 ODYSSEY PLAN (2026–2030)</div>

</div>

<div class="card">
  <div class="card-header">🎯 2026 Working Target</div>

    <ul class="target-list" id="targetList"></ul>

<!-- ─── WEEKLY CHECKLIST ────────────────────────────────── -->
<div class="card">
  <!-- Header -->
  <div class="checklist-header">
    <span class="checklist-title">📋 Weekly Checklist</span>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">◀</button>
      <div>
        <div class="week-label" id="weekLabel" style="text-align: center;">W1</div>
        <div class="week-dates" id="weekDates"></div>
      </div>
      <button onclick="changeWeek(+1)">▶</button>
    </div>
  </div>

  <!-- Core Task Panel -->
  <div class="core-task-wrapper">
    <div class="core-task-label">Weekly<br>Core Task</div>

      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>

<!-- ─── SCRIPT ──────────────────────────────────────────── -->
<script>
// ─── 전역 변수 ──────────────────────────────────────────
let currentUser = null;
let currentWeek = 1;
let taskProgress = {};   // { taskId: { completed, time } }
let coreTaskData = {};   // { Task:"...", digitalTwin:"...", vpd:"...", individual:"..." }
let unsubTasks = null;
let unsubCore  = null;

const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_KOR   = ["일","월","화","수","목","금","토"];
const GROUPS    = ["life1", "work", "life2"];
const GROUP_LABELS = { life1: "Health", work: "Work", life2: "Life" };

// ─── 날짜 유틸 ─────────────────────────────────────────
function getWeekNumber(date) {
  const diff = date.getTime() - START_DATE.getTime();
  const days = Math.floor(diff / 86400000);
  return Math.max(1, Math.floor(days / 7) + 1);
}
function getWeekStartDate(weekNum) {
  const d = new Date(START_DATE);
  d.setDate(START_DATE.getDate() + (weekNum - 1) * 7);
  return d;
}
function formatDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function pad2(n) { return String(n).padStart(2,'0'); }
function nowTime() {
  const n = new Date();
  return `${pad2(n.getHours())}:${pad2(n.getMinutes())}`;
}

// ─── 초기화 ─────────────────────────────────────────────
function init() {
  // 날짜
  document.getElementById('dateInfo').textContent =
    new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  // Odyssey Plan 렌더
  renderOdysseyPlan();
  renderTargets();
  renderCoreTaskGrid();

  // 현재 주
  currentWeek = getWeekNumber(new Date());
  updateWeekLabel();
  renderTableHeader();
  renderTableBody();
}

// ─── Odyssey Plan 렌더 ───────────────────────────────────
function renderOdysseyPlan() {
  const el = document.getElementById('odysseyPlan');
  const years = [2026, 2027, 2028, 2029, 2030];

  // 연도 헤더 행 (라벨 열 + 5열 균등)
  // grid-template-columns: 64px repeat(5,1fr) 과 맞추기 위해
  // 라벨 공백 + 연도 5개
  let yearsHtml = '<div class="od-row" style="margin-bottom:2px;">';
  yearsHtml += '<div></div>'; // 라벨 공백
  years.forEach((y, i) => {
    yearsHtml += `<div class="od-cell" style="position:relative;">
      <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:var(--sky);transform:translateY(-50%);z-index:0;"></div>
      <div style="position:relative;z-index:1;display:inline-flex;align-items:center;gap:4px;">
        <span style="font-size:10px;font-weight:700;color:var(--navy-md);background:var(--white);padding:0 3px;">${y}</span>
        <span style="width:7px;height:7px;border-radius:50%;background:var(--sky);display:inline-block;flex-shrink:0;"></span>
      </div>
    </div>`;
  });
  yearsHtml += '</div>';

  // Work 행: 미션 5개 각 1컬럼
  let workHtml = '<div class="od-row">';
  workHtml += '<div class="od-row-label">Work</div>';
  ODYSSEY_PLAN.work.forEach(m => {
    workHtml += `<div class="od-cell">
      <div class="mission-chip">
        <span class="chip-label">${m.label}</span>${m.title}
      </div>
    </div>`;
  });
  workHtml += '</div>';

  // Personal Life 행: Work와 동일하게 연도별 1컬럼
  let personalHtml = '<div class="od-row">';
  personalHtml += '<div class="od-row-label">Personal<br>Life</div>';
  ODYSSEY_PLAN.personal.forEach(m => {
    personalHtml += `<div class="od-cell">
      <div class="mission-chip personal">
        <span class="chip-label">${m.label}</span>${m.title}
      </div>
    </div>`;
  });
  personalHtml += '</div>';

  el.innerHTML = yearsHtml + workHtml + personalHtml;
}

function renderTargets() {
  const el = document.getElementById('targetList');
  el.innerHTML = WORKING_TARGETS.map((t,i) =>
    `<li><span class="target-num">${i+1}.</span><span class="target-text">${t}</span></li>`
  ).join('');
}

// ─── Core Task Grid ──────────────────────────────────────
function renderCoreTaskGrid() {
  const el = document.getElementById('coreTaskGrid');
  el.innerHTML = CORE_TASK_CATEGORIES.map(cat =>
    `<div class="core-task-item">
       <span class="core-task-name">${cat.label}</span>
       <input class="core-task-input" id="core_${cat.id}" type="text"
         placeholder="① 업무내용  ② 업무내용"
         value="${(coreTaskData[cat.id] || '')}">
     </div>`
  ).join('');
}

function loadCoreTaskInputs() {
  CORE_TASK_CATEGORIES.forEach(cat => {
    const el = document.getElementById(`core_${cat.id}`);
    if (el) el.value = coreTaskData[cat.id] || '';
  });
}

async function saveCoreTask() {
  if (!currentUser) { alert('로그인 후 저장 가능합니다.'); return; }
  const data = {};
  CORE_TASK_CATEGORIES.forEach(cat => {
    const el = document.getElementById(`core_${cat.id}`);
    data[cat.id] = el ? el.value.trim() : '';
  });
  try {
    await db.collection('users').doc(currentUser.uid)
      .collection('weeklyCoreTasks').doc(String(currentWeek))
      .set(data);
    coreTaskData = data;
    const btn = document.getElementById('updateBtn');
    btn.textContent = '✓ 저장됨';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Update'; btn.classList.remove('saved'); }, 2000);
  } catch(e) { console.error(e); }
}

// ─── Week 변경 ──────────────────────────────────────────
function changeWeek(delta) {
  currentWeek = Math.max(1, currentWeek + delta);
  updateWeekLabel();
  renderTableHeader();
  renderTableBody();
  if (currentUser) loadWeekData();
}

function updateWeekLabel() {
  document.getElementById('weekLabel').textContent = `W${currentWeek}`;
  const ws = getWeekStartDate(currentWeek);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('weekDates').textContent =
    `${formatDate(ws)} ~ ${formatDate(we)}`;
}

// ─── 테이블 렌더 ─────────────────────────────────────────
function renderTableHeader() {
  const today = new Date();
  const ws = getWeekStartDate(currentWeek);
  let html = '<tr><th style="width:22px"></th>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    const isWknd  = i === 0 || i === 6;
    const cls = isToday ? 'today-hdr' : isWknd ? 'weekend-hdr' : '';
    html += `<th class="${cls}">${DAY_NAMES[i]}<br><span style="font-weight:400;font-size:10px">(${formatDate(d)})</span></th>`;
  }
  html += '</tr>';
  document.getElementById('tableHead').innerHTML = html;
}

function renderTableBody() {
  const today = new Date();
  const ws = getWeekStartDate(currentWeek);
  let html = '';

  // 3개 그룹 행 (life1 / work / life2)
  const rowClsMap = { life1: 'life1-row', work: 'work-row', life2: 'life2-row' };
  GROUPS.forEach((grp, grpIdx) => {
    const rowCls = rowClsMap[grp];
    html += `<tr class="${rowCls}">`;
    html += `<td class="section-label">${GROUP_LABELS[grp]}</td>`;
    for (let day = 0; day < 7; day++) {
      const d = new Date(ws); d.setDate(ws.getDate() + day);
      const isToday = d.toDateString() === today.toDateString();
      const isWknd  = day === 0 || day === 6;
      let cellCls = 'task-cell';
      if (isToday) cellCls += ' today-col';
      if (isWknd)  cellCls += ' weekend-col';

      const tasks = ROUTINE[grp][day] || [];
      const life1Len  = (ROUTINE.life1[day]||[]).length;
      const workLen   = (ROUTINE.work[day]||[]).length;
      const grpOffset = grpIdx === 0 ? 0 : grpIdx === 1 ? life1Len : life1Len + workLen;

      let cellHtml = '';
      tasks.forEach((task, tIdx) => {
        const globalIdx = grpOffset + tIdx;
        const tid = `${currentWeek}-${day}_task${globalIdx}`;
        const prog = taskProgress[tid] || {};
        const done = prog.completed ? 'done' : '';
        const tm   = prog.time || '';
        const num  = globalIdx + 1;
        cellHtml += `<div class="task-item ${done}" id="ti_${tid}"
          onclick="toggleTask('${tid}',${day},${grpIdx},${tIdx})">
          <span class="task-num">${num}.</span>
          <span class="task-name">${task}</span>
          <span class="task-time">${tm}</span>
        </div>`;
      });
      html += `<td class="${cellCls}">${cellHtml}</td>`;
    }
    html += '</tr>';
  });

  // 통합 카운터 행 (맨 아래 한 줄: 날짜별 전체 완료 X/N)
  html += '<tr class="counter-row">';
  html += '<td class="section-label" style="border-top:1px solid var(--border);"></td>';
  for (let day = 0; day < 7; day++) {
    const d = new Date(ws); d.setDate(ws.getDate() + day);
    const isToday = d.toDateString() === today.toDateString();
    const todayCls = isToday ? ' today-col' : '';
    let totalDay = 0, doneDay = 0;
    GROUPS.forEach((grp, grpIdx) => {
      const tasks = ROUTINE[grp][day] || [];
      const life1Len  = (ROUTINE.life1[day]||[]).length;
      const workLen   = (ROUTINE.work[day]||[]).length;
      const grpOffset = grpIdx === 0 ? 0 : grpIdx === 1 ? life1Len : life1Len + workLen;
      totalDay += tasks.length;
      tasks.forEach((_, tIdx) => {
        const tid = `${currentWeek}-${day}_task${grpOffset + tIdx}`;
        if (taskProgress[tid] && taskProgress[tid].completed) doneDay++;
      });
    });
    const fullCls = (doneDay === totalDay && totalDay > 0) ? 'full' : '';
    html += `<td class="${todayCls}">
      <span class="day-total-counter ${fullCls}" id="dayct_${currentWeek}-${day}">${doneDay}/${totalDay}</span>
    </td>`;
  }
  html += '</tr>';

  document.getElementById('tableBody').innerHTML = html;
  updateProgress();
}

// ─── 태스크 토글 ─────────────────────────────────────────
async function toggleTask(tid, day, grpIdx, tIdx) {
  const el = document.getElementById(`ti_${tid}`);
  if (!el) return;
  const wasDone = el.classList.contains('done');
  const now = nowTime();

  if (wasDone) {
    el.classList.remove('done');
    el.querySelector('.task-time').textContent = '';
    if (currentUser) {
      await db.collection('users').doc(currentUser.uid)
        .collection('weeklyTasks').doc(tid)
        .set({ completed: firebase.firestore.FieldValue.delete(),
               time: firebase.firestore.FieldValue.delete() }, { merge: true });
    }
    if (taskProgress[tid]) { delete taskProgress[tid].completed; delete taskProgress[tid].time; }
  } else {
    el.classList.add('done');
    el.querySelector('.task-time').textContent = now;
    if (currentUser) {
      await db.collection('users').doc(currentUser.uid)
        .collection('weeklyTasks').doc(tid)
        .set({ completed: true, time: now }, { merge: true });
    }
    taskProgress[tid] = { completed: true, time: now };
  }

  updateDayCounter(day);
  updateProgress();
}

function updateDayCounter(day) {
  // 날짜별 통합 카운터 업데이트
  let totalDay = 0, doneDay = 0;
  GROUPS.forEach((grp, grpIdx) => {
    const tasks = ROUTINE[grp][day] || [];
    const life1Len  = (ROUTINE.life1[day]||[]).length;
    const workLen   = (ROUTINE.work[day]||[]).length;
    const grpOffset = grpIdx === 0 ? 0 : grpIdx === 1 ? life1Len : life1Len + workLen;
    totalDay += tasks.length;
    tasks.forEach((_, tIdx) => {
      const tid = `${currentWeek}-${day}_task${grpOffset + tIdx}`;
      if (taskProgress[tid] && taskProgress[tid].completed) doneDay++;
    });
  });
  const el = document.getElementById(`dayct_${currentWeek}-${day}`);
  if (el) {
    el.textContent = `${doneDay}/${totalDay}`;
    el.className = `day-total-counter${(doneDay === totalDay && totalDay > 0) ? ' full' : ''}`;
  }
}

function updateProgress() {
  let total = 0, done = 0;
  // 평일(월~금)만 계산
  for (let day = 1; day <= 5; day++) {
    GROUPS.forEach((grp, grpIdx) => {
      const tasks = ROUTINE[grp][day] || [];
      const life1Len  = (ROUTINE.life1[day]||[]).length;
      const workLen   = (ROUTINE.work[day]||[]).length;
      const grpOffset = grpIdx === 0 ? 0 : grpIdx === 1 ? life1Len : life1Len + workLen;
      total += tasks.length;
      tasks.forEach((_,tIdx) => {
        const tid = `${currentWeek}-${day}_task${grpOffset + tIdx}`;
        if (taskProgress[tid] && taskProgress[tid].completed) done++;
      });
    });
  }
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressText').textContent =
    `W${currentWeek}  진행률: ${pct}% (${done}/${total} 완료, 평일기준)`;
}

// ─── Firebase 데이터 로드 ────────────────────────────────
function loadWeekData() {
  if (!currentUser) return;
  const uRef = db.collection('users').doc(currentUser.uid);

  // 주간 루틴 태스크
  if (unsubTasks) unsubTasks();
  unsubTasks = uRef.collection('weeklyTasks').onSnapshot(snap => {
    taskProgress = {};
    snap.forEach(doc => { taskProgress[doc.id] = doc.data(); });
    renderTableBody();
  }, e => console.error(e));

  // Core Task
  if (unsubCore) unsubCore();
  unsubCore = uRef.collection('weeklyCoreTasks').doc(String(currentWeek)).onSnapshot(doc => {
    coreTaskData = doc.exists ? doc.data() : {};
    loadCoreTaskInputs();
  }, e => console.error(e));
}

function clearData() {
  taskProgress = {};
  coreTaskData = {};
  renderTableBody();
  loadCoreTaskInputs();
}

// ─── Firebase Auth ────────────────────────────────────────
auth.onAuthStateChanged(user => {
  const overlay = document.getElementById('loginOverlay');
  const main    = document.getElementById('mainContent');
  const uiInfo  = document.getElementById('userInfo');

  if (user) {
    currentUser = user;
    overlay.style.display = 'none';
    main.style.display    = 'block';
    uiInfo.style.display  = 'flex';
    document.getElementById('userName').textContent = user.email;
    loadWeekData();
  } else {
    currentUser = null;
    overlay.style.display = 'flex';
    main.style.display    = 'none';
    uiInfo.style.display  = 'none';
    clearData();
  }
});

document.getElementById('loginBtn').onclick = async () => {
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('password').value;
  if (!e||!p) { setMsg('이메일과 비밀번호를 입력하세요.'); return; }
  try { await auth.signInWithEmailAndPassword(e, p); }
  catch(err) { setMsg(getErrMsg(err.code)); }
};
document.getElementById('signupBtn').onclick = async () => {
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('password').value;
  if (!e||!p) { setMsg('이메일과 비밀번호를 입력하세요.'); return; }
  try { await auth.createUserWithEmailAndPassword(e, p); }
  catch(err) { setMsg(getErrMsg(err.code)); }
};
document.getElementById('logoutBtn').onclick = () => auth.signOut();

function setMsg(msg, color='#e53e3e') {
  const el = document.getElementById('authMsg');
  el.textContent = msg; el.style.color = color;
  setTimeout(() => { el.textContent = ''; }, 4000);
}
function getErrMsg(code) {
  const m = {
    'auth/user-not-found':'가입되지 않은 이메일','auth/wrong-password':'비밀번호 오류',
    'auth/email-already-in-use':'이미 사용 중','auth/weak-password':'비밀번호 6자 이상',
    'auth/invalid-email':'이메일 형식 오류','auth/invalid-credential':'이메일 또는 비밀번호 오류'
  };
  return m[code] || '오류: '+code;
}

// ─── 시작 ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
