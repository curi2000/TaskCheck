  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odyssey Checklist</title>
  <style>
    /* ============================================================
       ODYSSEY CHECKLIST  –  version 1.5 (Responsive)
    ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

    :root {
      --navy:   #1a365d;
      --navy-md:#2a4a7f;
      --sky:    #4299e1;
      --mint:   #c6f6d5;
      --green:  #38a169;
      --amber:  #f6ad55;
      --amber-bg:#fff8ee;
      --life-bg:#f0faf4;
      --work-bg:#f7faff;
      --border: #d6e4f0;
      --text:   #2d3748;
      --muted:  #718096;
      --done-bg:#d4edda;
      --done-txt:#276749;
      --white:  #ffffff;
      --bg:     #eef2f7;
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      padding: 12px 16px 30px;
    }

    /* ─── 전체화면 로그인 오버레이 ──────────── */
    #loginOverlay {
      display: flex;
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #1a365d 0%, #2a4a7f 50%, #1a365d 100%);
      align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 36px 40px 32px;
      width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .login-logo { font-size: 32px; margin-bottom: 4px; }
    .login-title {
      font-size: 18px; font-weight: 700; color: var(--navy);
      margin-bottom: 2px; letter-spacing: -0.3px;
    }
    .login-sub { font-size: 11px; color: var(--muted); margin-bottom: 24px; }
    .login-field {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit;
      margin-bottom: 10px; outline: none;
      transition: border-color 0.2s;
    }
    .login-field:focus { border-color: var(--sky); }
    .login-btns { display: flex; gap: 8px; margin-top: 4px; }
    .btn-login-full {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login-full:hover { opacity: 0.88; }
    .btn-login-main  { background: var(--navy);  color: #fff; }
    .btn-signup-main { background: var(--green); color: #fff; }
    .login-msg { font-size: 11px; margin-top: 10px; min-height: 16px; }

    /* ─── HEADER ─────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .app-title { font-size: 20px; font-weight: 700; color: var(--navy); letter-spacing: -0.5px; }
    .app-date  { font-size: 11px; color: var(--muted); }
    .auth-area { display: flex; align-items: center; gap: 6px; }
    .btn-sm {
      padding: 5px 10px; border: none; border-radius: var(--radius);
      cursor: pointer; font-size: 11px; font-weight: 600;
    }
    .btn-logout { background: #e53e3e; color: #fff; }
    .user-info  { display: none; align-items: center; gap: 8px; font-size: 11px; }

    /* ─── CARD ───────────────────────────────── */
    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card-header {
      background: var(--navy);
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .card-body { padding: 10px 12px; }

    /* ─── ODYSSEY PLAN ───────────────────────── */
    .od-row {
      display: grid;
      grid-template-columns: 64px repeat(5, 1fr);
      align-items: stretch;
      margin-bottom: 5px;
    }
    .od-row-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-align: right; padding-right: 8px;
      display: flex; align-items: center; justify-content: flex-end;
      line-height: 1.3;
    }
    .od-cell { padding: 0 3px; }
    .mission-chip {
      display: block;
      background: var(--work-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 11px;
      height: 100%;
      box-sizing: border-box;
    }
    .mission-chip .chip-label {
      font-size: 9px; font-weight: 700; color: var(--sky);
      display: block; margin-bottom: 1px;
    }
    .mission-chip.personal { background: var(--life-bg); }
    .mission-chip.personal .chip-label { color: var(--green); }
    
    .mob-year { display: none; font-weight: 500; color: var(--muted); }

    /* ─── WORKING TARGET ─────────────────────── */
    .target-list { list-style: none; }
    .target-list li {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 3px 0;
      border-bottom: 1px dashed var(--border);
    }
    .target-list li:last-child { border-bottom: none; }
    .target-num {
      font-size: 10px; font-weight: 700; color: var(--sky);
      min-width: 16px;
    }
    .target-text { font-size: 11px; line-height: 1.5; }

    /* ─── WEEKLY CHECKLIST ───────────────────── */
    .checklist-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px;
      background: var(--navy);
      color: #fff;
    }
    .checklist-title { font-size: 13px; font-weight: 700; }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-nav button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 2px 10px;
      border-radius: 4px; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    .week-nav button:hover { background: rgba(255,255,255,0.3); }
    .week-label { font-size: 15px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .week-dates { font-size: 10px; color: rgba(255,255,255,0.7); }

    /* Core Task Panel */
    .core-task-wrapper {
      background: var(--amber-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .core-task-label {
      font-size: 10px; font-weight: 700; color: var(--navy);
      min-width: 70px; padding-top: 6px;
      text-align: center; line-height: 1.3;
    }
    .core-task-grid {
      flex: 1;
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }
    .core-task-item {
      display: flex; align-items: center; gap: 6px;
    }
    .core-task-name {
      font-size: 11px; font-weight: 700; color: var(--navy-md);
      min-width: 80px; white-space: nowrap;
    }
    .core-task-input {
      flex: 1; border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 6px;
      font-size: 11px; background: var(--white);
      font-family: 'IBM Plex Sans KR', sans-serif;
    }
    .core-task-input:focus { outline: none; border-color: var(--sky); }
    .btn-update {
      background: #e6b800; color: #5a3e00;
      border: none; border-radius: 4px;
      padding: 6px 12px; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
      align-self: center;
    }
    .btn-update:hover { background: #f0c800; }
    .btn-update.saved { background: var(--green); color: #fff; }

    /* ─── ROUTINE TABLE (PC Default) ─────────── */
    .routine-table-wrap { overflow-x: auto; }
    .routine-table {
      width: 100%; border-collapse: collapse;
      table-layout: fixed;
    }
    .routine-table th {
      background: var(--navy);
      color: #fff; font-size: 11px; font-weight: 600;
      text-align: center; padding: 5px 3px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .routine-table th.today-hdr { background: var(--sky); }
    .routine-table th.weekend-hdr { background: var(--navy-md); }

    .routine-table td.section-label {
      font-size: 10px; font-weight: 700;
      color: var(--muted); text-align: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 4px 2px;
      border: none;
      border-right: 1px solid var(--border);
      width: 20px;
    }
    .routine-table tr.life1-row td.section-label { background: #edfaf3; color: var(--green); }
    .routine-table tr.work-row td.section-label  { background: #eef4ff; color: var(--navy-md); }
    .routine-table tr.life2-row td.section-label { background: #edfaf3; color: var(--green); }

    .routine-table td.task-cell {
      vertical-align: top;
      padding: 3px 4px;
      border: none;
      border-right: 1px solid rgba(200,215,230,0.5);
    }
    .routine-table tr.life1-row td.task-cell { background: #f4fcf7; }
    .routine-table tr.work-row  td.task-cell { background: #f5f8ff; }
    .routine-table tr.life2-row td.task-cell { background: #f4fcf7; }
    .routine-table td.task-cell.today-col    {
      border-left: 2px solid var(--sky) !important;
      background: rgba(235,248,255,0.7) !important;
    }
    .routine-table td.section-label.today-col { border-left: 2px solid var(--sky) !important; }
    .routine-table td.task-cell.weekend-col  { background: #fffbf0 !important; }

    .routine-table tr.work-row td { border-top: 1px solid rgba(180,200,220,0.4); }
    .routine-table tr.life2-row td { border-top: 1px solid rgba(180,200,220,0.4); }

    .routine-table tr.counter-row td {
      background: var(--white); border: none;
      border-top: 1px solid var(--border);
      border-right: 1px solid rgba(200,215,230,0.5);
      text-align: center; padding: 3px 2px 4px;
    }
    .routine-table tr.counter-row td.today-col {
      border-left: 2px solid var(--sky) !important;
      background: rgba(235,248,255,0.7) !important;
    }
    
    .day-total-counter { font-size: 11px; font-weight: 700; color: var(--navy-md); }
    .day-total-counter.full { color: var(--green); }

    .task-item {
      display: flex; align-items: center; gap: 3px;
      padding: 2px 3px; border-radius: 3px;
      cursor: pointer; transition: all 0.15s;
      font-size: 11px; line-height: 1.3;
      color: var(--text);
    }
    .task-item:hover { background: rgba(66,153,225,0.1); border-radius: 3px; }
    .task-item.done {
      text-decoration: line-through;
      background: var(--done-bg); color: var(--done-txt); opacity: 0.75;
    }
    .task-num { font-size: 9px; color: var(--muted); min-width: 12px; }
    .task-name { flex: 1; }
    .task-time { font-size: 9px; color: var(--muted); }

    .progress-bar-wrap {
      padding: 5px 12px; background: var(--work-bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .progress-bar-bg {
      flex: 1; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--green);
      border-radius: 3px; transition: width 0.4s ease;
    }
    .progress-text { font-size: 10px; color: var(--muted); white-space: nowrap; }

    /* ============================================================
       모바일 반응형: CARD UI 최적화 
    ============================================================ */
    @media (max-width: 768px) {
      /* 코어 태스크 모바일 정렬 */
      .core-task-wrapper { flex-direction: column; align-items: stretch; }
      .core-task-label { text-align: left; padding-top: 0; margin-bottom: 4px; }
      .core-task-grid { grid-template-columns: 1fr; }
      .btn-update { width: 100%; margin-top: 8px; padding: 10px; font-size: 13px; }

      /* 타겟 리스트 */
      .target-list li { padding: 8px 0; }
      .target-text { font-size: 12px; }

      /* Odyssey Plan 모바일 카드화 */
      .mob-year { display: inline; }
      .od-row {
        display: flex; flex-direction: column; gap: 8px;
        margin-bottom: 16px; padding: 12px;
        border: 1px solid var(--border); border-radius: 8px;
        background: var(--white);
      }
      .od-row:first-child { display: none; } /* 연도 헤더 행 숨김 */
      .od-row-label {
        text-align: left; justify-content: flex-start;
        padding: 0; margin-bottom: 4px; font-size: 13px;
        color: var(--navy); border-bottom: 1px solid var(--border); padding-bottom: 6px;
      }
      .od-cell { padding: 0; }
      .mission-chip { padding: 10px 12px; height: auto; }
      .mission-chip .chip-label { font-size: 11px; margin-bottom: 2px; }

      /* 주간 루틴 테이블 -> 모바일 Day Card UI */
      .routine-table-wrap { overflow-x: visible; }
      .routine-table { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
      #tableHead { display: none; } /* 기존 요일 헤더 숨김 */
      #tableBody { display: flex; flex-direction: column; }
      
      /* Flex Order를 활용해 날짜별로 요소를 그룹화 (CSS 마법) */
      .routine-table tr { display: contents; }
      .routine-table td.section-label { display: none; } /* 가로 라벨 숨김 */

      .routine-table td.task-cell {
        display: block; width: 100% !important; box-sizing: border-box;
        order: var(--mob-order);
        border: none;
        border-left: 1px solid var(--border) !important;
        border-right: 1px solid var(--border) !important;
        padding: 10px 12px;
      }

      /* Day Card: 아침/업무/저녁 배지 표시 */
      .routine-table td.task-cell::before {
        content: attr(data-grp-label);
        display: inline-block; font-size: 10px; font-weight: 700;
        padding: 3px 6px; border-radius: 4px; margin-bottom: 8px;
      }
      .routine-table td.task-cell[data-grp="life1"]::before { background: #edfaf3; color: var(--green); }
      .routine-table td.task-cell[data-grp="work"]::before { background: #eef4ff; color: var(--navy-md); }
      .routine-table td.task-cell[data-grp="life2"]::before { background: #edfaf3; color: var(--green); }

      /* 카드의 상단(Morning)에 날짜 헤더 삽입 */
      .routine-table td.task-cell[data-grp="life1"] {
        border-top: 1px solid var(--border) !important;
        border-top-left-radius: 8px; border-top-right-radius: 8px;
        position: relative; padding-top: 44px;
      }
      .routine-table td.task-cell[data-grp="life1"]::after {
        content: attr(data-day-name) " (" attr(data-date) ")";
        position: absolute; top: 12px; left: 12px;
        font-size: 14px; font-weight: 700; color: var(--navy);
      }

      /* 카드 중간 영역 경계선 */
      .routine-table td.task-cell[data-grp="work"],
      .routine-table td.task-cell[data-grp="life2"] {
        border-top: 1px dashed var(--border) !important;
      }

      /* 카드의 하단(Counter) 영역 지정 */
      .routine-table tr.counter-row td {
        display: flex; justify-content: space-between; align-items: center;
        order: var(--mob-order);
        width: 100%; box-sizing: border-box;
        border: none !important;
        border-top: 1px dashed var(--border) !important;
        border-left: 1px solid var(--border) !important;
        border-right: 1px solid var(--border) !important;
        border-bottom: 1px solid var(--border) !important;
        border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;
        padding: 12px; background: var(--white);
        margin-bottom: 16px;
      }
      .routine-table tr.counter-row td.section-label { display: none; }
      .routine-table tr.counter-row td::before {
        content: "Daily Progress";
        font-size: 12px; font-weight: 700; color: var(--muted);
      }

      /* 오늘 날짜 카드 강조 테두리 (모바일 버전) */
      .routine-table td.task-cell.today-col {
        border-left: 3px solid var(--sky) !important;
        border-right: 3px solid var(--sky) !important;
      }
      .routine-table td.task-cell[data-grp="life1"].today-col {
         border-top: 3px solid var(--sky) !important;
      }
      .routine-table tr.counter-row td.today-col {
         border-bottom: 3px solid var(--sky) !important;
         border-left: 3px solid var(--sky) !important;
         border-right: 3px solid var(--sky) !important;
      }

      /* 터치 편의성을 위해 태스크 아이템 여백 확장 */
      .task-item { padding: 8px 6px; font-size: 12px; margin-bottom: 2px; }
      .task-num { font-size: 11px; }
      .task-time { font-size: 10px; }
    }
  </style>
</head>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  1. ODYSSEY PLAN  (5년 계획, 2026-2030)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    { years: "2027",      label: "M2", title: "AI Air 절전로직 전개 및 고도화 (상반기: 마이콤 경량 버전, 하반기: 난방)" },
    { years: "2028",      label: "M3", title: "AI Air 진단로직 개발" },

    { years: "2027", label: "M2", title: "75kg(BMI<24)/마스터즈/EF60/베트남" },
    { years: "2028", label: "M3", title: "72kg(BMI<23)/마라톤10km/EF70/포르투갈" },
    { years: "2029", label: "M4", title: "69kg(BMI<22)/마라톤20km/EF80/일본" },
    { years: "2030", label: "M5", title: "BMI=22유지/철인3종/EF90/호주" },
  ]

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  2. 2026 WORKING TARGET  (올해 목표)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const WORKING_TARGETS = [
  "[APEX TDR] RAC 전라인업 열교환기 최적 설계, 사양 스크리닝/확정", 
  "[Digital Twin] Simple Cycle Model의 구현과 이를 이용한 최적 절전로직 개발 (Realtime Power/Load Estimation, +10%↑)",
  "[VPD Solution] RAC 예측 적확도 향상(Accuracy 95%↑), CoilDesigner/VapCyc/DySim 활용 백서 작성",  
  "An AI‑native R&D engineer bridging physics models and data-driven automation in RAC.",

<script>
// ─── 전역 변수 ──────────────────────────────────────────
let currentUser = null;
let currentWeek = 1;
let taskProgress = {};
let coreTaskData = {};
let unsubTasks = null;
let unsubCore  = null;

const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_KOR   = ["일","월","화","수","목","금","토"];
const GROUPS    = ["life1", "work", "life2"];
const GROUP_LABELS = { life1: "Morning", work: "Work", life2: "Night" };

// ─── 날짜 유틸 ─────────────────────────────────────────
function getWeekNumber(date) {
  const diff = date.getTime() - START_DATE.getTime();
  const days = Math.floor(diff / 86400000);
  return Math.max(1, Math.floor(days / 7) + 1);
}
function getWeekStartDate(weekNum) {
  const d = new Date(START_DATE);
  d.setDate(START_DATE.getDate() + (weekNum - 1) * 7);
  return d;
}
function formatDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function pad2(n) { return String(n).padStart(2,'0'); }
function nowTime() {
  const n = new Date();
  return `${pad2(n.getHours())}:${pad2(n.getMinutes())}`;
}

// ─── 초기화 ─────────────────────────────────────────────
function init() {
  document.getElementById('dateInfo').textContent =
    new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  renderOdysseyPlan();
  renderTargets();
  renderCoreTaskGrid();
  currentWeek = getWeekNumber(new Date());
  updateWeekLabel();
  renderTableHeader();
  renderTableBody();
}

// ─── Odyssey Plan 렌더 ───────────────────────────────────
function renderOdysseyPlan() {
  const el = document.getElementById('odysseyPlan');
  const years = [2026, 2027, 2028, 2029, 2030];

  let yearsHtml = '<div class="od-row" style="margin-bottom:2px;">';
  yearsHtml += '<div></div>';
  years.forEach((y, i) => {
    yearsHtml += `<div class="od-cell" style="position:relative;">
      <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:var(--sky);transform:translateY(-50%);z-index:0;"></div>
      <div style="position:relative;z-index:1;display:inline-flex;align-items:center;gap:4px;">
        <span style="font-size:10px;font-weight:700;color:var(--navy-md);background:var(--white);padding:0 3px;">${y}</span>
        <span style="width:7px;height:7px;border-radius:50%;background:var(--sky);display:inline-block;flex-shrink:0;"></span>
      </div>
    </div>`;
  });
  yearsHtml += '</div>';

  let workHtml = '<div class="od-row">';
  workHtml += '<div class="od-row-label">Work</div>';
  ODYSSEY_PLAN.work.forEach(m => {
    workHtml += `<div class="od-cell">
      <div class="mission-chip">
        <span class="chip-label">${m.label} <span class="mob-year">(${m.years})</span></span>${m.title}
      </div>
    </div>`;
  });
  workHtml += '</div>';

  let personalHtml = '<div class="od-row">';
  personalHtml += '<div class="od-row-label">Personal<br>Life</div>';
  ODYSSEY_PLAN.personal.forEach(m => {
    personalHtml += `<div class="od-cell">
      <div class="mission-chip personal">
        <span class="chip-label">${m.label} <span class="mob-year">(${m.years})</span></span>${m.title}
      </div>
    </div>`;
  });
  personalHtml += '</div>';

  el.innerHTML = yearsHtml + workHtml + personalHtml;
}

function renderTargets() {
  const el = document.getElementById('targetList');
  el.innerHTML = WORKING_TARGETS.map((t,i) =>
    `<li><span class="target-num">${i+1}.</span><span class="target-text">${t}</span></li>`
  ).join('');
}

// ─── Core Task Grid ──────────────────────────────────────
function renderCoreTaskGrid() {
  const el = document.getElementById('coreTaskGrid');
  el.innerHTML = CORE_TASK_CATEGORIES.map(cat =>
    `<div class="core-task-item">
       <span class="core-task-name">${cat.label}</span>
       <input class="core-task-input" id="core_${cat.id}" type="text"
         placeholder="업무내용"
         value="${(coreTaskData[cat.id] || '')}">
     </div>`
  ).join('');
}

function loadCoreTaskInputs() {
  CORE_TASK_CATEGORIES.forEach(cat => {
    const el = document.getElementById(`core_${cat.id}`);
    if (el) el.value = coreTaskData[cat.id] || '';
  });
}

async function saveCoreTask() {
  if (!currentUser) { alert('로그인 후 저장 가능합니다.'); return; }
  const data = {};
  CORE_TASK_CATEGORIES.forEach(cat => {
    const el = document.getElementById(`core_${cat.id}`);
    data[cat.id] = el ? el.value.trim() : '';
  });
  try {
    await db.collection('users').doc(currentUser.uid)
      .collection('weeklyCoreTasks').doc(String(currentWeek))
      .set(data);
    coreTaskData = data;
    const btn = document.getElementById('updateBtn');
    btn.textContent = '✓ 저장됨';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Update'; btn.classList.remove('saved'); }, 2000);
  } catch(e) { console.error(e); }
}

// ─── Week 변경 ──────────────────────────────────────────
function changeWeek(delta) {
  currentWeek = Math.max(1, currentWeek + delta);
  updateWeekLabel();
  renderTableHeader();
  renderTableBody();
  if (currentUser) loadWeekData();
}

function updateWeekLabel() {
  document.getElementById('weekLabel').textContent = `W${currentWeek}`;
  const ws = getWeekStartDate(currentWeek);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('weekDates').textContent =
    `${formatDate(ws)} ~ ${formatDate(we)}`;
}

// ─── 테이블 렌더 ─────────────────────────────────────────
function renderTableHeader() {
  const today = new Date();
  const ws = getWeekStartDate(currentWeek);
  let html = '<tr><th style="width:22px"></th>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    const isWknd  = i === 0 || i === 6;
    const cls = isToday ? 'today-hdr' : isWknd ? 'weekend-hdr' : '';
    html += `<th class="${cls}">${DAY_NAMES[i]}<br><span style="font-weight:400;font-size:10px">(${formatDate(d)})</span></th>`;
  }
  html += '</tr>';
  document.getElementById('tableHead').innerHTML = html;
}

function renderTableBody() {
  const today = new Date();
  const ws = getWeekStartDate(currentWeek);
  let html = '';

  const rowClsMap = { life1: 'life1-row', work: 'work-row', life2: 'life2-row' };
