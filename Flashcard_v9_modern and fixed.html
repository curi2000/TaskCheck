<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 문장 학습 웹 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ──────────────────────────────────────
           CSS 변수 (색상 팔레트)
           수정 시 여기서 색상을 한 번에 바꿀 수 있습니다.
        ────────────────────────────────────── */
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #11998e;
            --success-light: #38ef7d;
            --warning: #fa709a;
            --warning-light: #fee140;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── 공통 카드 스타일 ── */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(31, 38, 135, 0.25);
        }

        /* ── 버튼 스타일 ── */
        .gradient-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-size: 1rem;
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .gradient-btn:active {
            transform: translateY(0);
        }

        /* 성공(초록) 버튼 */
        .gradient-btn.success {
            background: linear-gradient(135deg, var(--success), var(--success-light));
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }

        .gradient-btn.success:hover {
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.5);
        }

        /* 경고(핑크) 버튼 */
        .gradient-btn.warning {
            background: linear-gradient(135deg, var(--warning), var(--warning-light));
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.3);
            color: #333;
        }

        .gradient-btn.warning:hover {
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.5);
        }

        .gradient-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── 입력 필드 ── */
        .input-field {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* ── 인증 화면 ── */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .auth-content {
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .auth-section {
            margin-bottom: 30px;
        }

        .auth-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        /* 구분선 */
        .divider {
            position: relative;
            margin: 30px 0;
            text-align: center;
            color: #999;
            font-size: 0.9rem;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 0 12px;
        }

        /* ── 메인 화면 ── */
        .main-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-info span {
            color: white;
            font-weight: 500;
        }

        /* ── 모드 탭 ── */
        .mode-tabs {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-tab {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.7);
            color: #333;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        /* ── 콘텐츠 섹션 (탭 전환) ── */
        .content-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .content-section.active {
            display: block;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: white;
        }

        /* ── 폼 카드 ── */
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }

        /* ── 테이블 래퍼: 높이 고정 + 내부 스크롤 ── */
        .table-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            margin-top: 20px;
            overflow: hidden;          /* 테두리 둥글게 유지 */
        }

        /* thead는 항상 상단 고정, tbody만 스크롤 */
        .table-scroll {
            max-height: 400px;         /* ← 원하는 높이로 조정 가능 */
            overflow-y: auto;
            overflow-x: auto;
        }

        /* 스크롤바 스타일 (webkit) */
        .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: #f0f0f0; }
        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;          /* 좁은 화면에서 가로 스크롤 허용 */
        }

        /* thead sticky: 스크롤해도 헤더 고정 */
        .table-wrapper thead {
            position: sticky;
            top: 0;
            z-index: 1;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
        }

        .table-wrapper th {
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 2px solid #e5e7eb;
            font-size: 0.88rem;
            white-space: nowrap;
        }

        .table-wrapper td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.93rem;
            color: #333;
            vertical-align: middle;
        }

        .table-wrapper tbody tr:hover {
            background: #f0f0ff;
            transition: background 0.15s ease;
        }

        /* 선택된 행 강조 */
        .table-wrapper tbody tr.selected {
            background: rgba(102, 126, 234, 0.1);
        }

        /* 체크박스 열 */
        .table-wrapper th.col-check,
        .table-wrapper td.col-check {
            width: 40px;
            text-align: center;
            padding: 12px 8px;
        }

        /* 커스텀 체크박스 */
        .row-checkbox {
            width: 17px;
            height: 17px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* 목록 하단 액션 바 (삭제·수정 버튼 영역) */
        .list-action-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.6);
            border-top: 1px solid #e5e7eb;
            border-radius: 0 0 16px 16px;
            flex-wrap: wrap;
        }

        .list-action-bar .selected-count {
            font-size: 0.9rem;
            color: #666;
            margin-right: auto;        /* 버튼을 오른쪽으로 밀기 */
        }

        /* 삭제 버튼 (빨간 계열) */
        .btn-danger {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 9px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 3px 10px rgba(255, 65, 108, 0.35);
            font-size: 0.9rem;
        }

        .btn-danger:hover  { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 65, 108, 0.5); }
        .btn-danger:active { transform: translateY(0); }
        .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* 수정 버튼 (파란 계열) */
        .btn-edit {
            background: linear-gradient(135deg, #4776e6, #8e54e9);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 9px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 3px 10px rgba(71, 118, 230, 0.35);
            font-size: 0.9rem;
        }

        .btn-edit:hover  { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(71, 118, 230, 0.5); }
        .btn-edit:active { transform: translateY(0); }
        .btn-edit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── 수정 모달 ── */
        .edit-modal-content {
            max-width: 520px;
        }

        .edit-modal-content .modal-body .form-group {
            margin-bottom: 18px;
        }

        .edit-modal-content .modal-body label {
            display: block;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .edit-modal-content .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ── 학습 박스 ── */
        .study-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            text-align: center;
            margin-bottom: 20px;
        }

        .study-stats {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .question-display {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-display p {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
        }

        .result-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--primary);
        }

        .result-label {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .correct-answer,
        .user-input {
            margin: 10px 0;
            font-size: 0.95rem;
        }

        .correct-answer { color: #11998e; }
        .user-input     { color: #fa709a; }

        /* ── 읽기 모드 ── */
        .reading-display {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: 12px;
            padding: 40px;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .reading-display p {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
            text-align: center;
        }

        .countdown {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            font-weight: 700;
            color: var(--warning);
        }

        /* ── 모달 ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            /* 수정: flex-items → align-items */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            animation: slideInUp 0.3s ease-out;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 24px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-body {
            padding: 24px;
            color: #333;
        }

        .modal-footer {
            padding: 16px 24px;
            background: #f9f9f9;
            text-align: right;
            border-top: 1px solid #e5e7eb;
        }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; }
            .button-group { flex-direction: column; }
            .mode-tabs { width: 100%; }
            .mode-tab { flex: 1; }
            .auth-content { padding: 30px; }
            .question-display p { font-size: 1.5rem; }
            .reading-display p  { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- ════════════════════════════════════════
         인증 화면 (로그인 / 회원가입)
    ════════════════════════════════════════ -->
    <div id="auth-frame" class="auth-container">
        <div class="glass-card auth-box">
            <div class="auth-header">
                <div style="font-size: 3.5rem; margin-bottom: 12px;">📚</div>
                <h1>Learn English</h1>
                <p>Let's master English sentences together</p>
            </div>
            <div class="auth-content">
                <!-- 회원가입 -->
                <div class="auth-section">
                    <h2>✨ 회원가입</h2>
                    <div class="input-group">
                        <input type="email" id="signup-email" class="input-field" placeholder="이메일을 입력하세요">
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-password" class="input-field" placeholder="비밀번호를 입력하세요">
                    </div>
                    <button id="signup-btn" class="gradient-btn success" style="width: 100%;">🔐 가입하기</button>
                </div>

                <div class="divider"><span>또는</span></div>

                <!-- 로그인 -->
                <div class="auth-section">
                    <h2>🔓 로그인</h2>
                    <div class="input-group">
                        <input type="email" id="login-email" class="input-field" placeholder="이메일을 입력하세요">
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" class="input-field" placeholder="비밀번호를 입력하세요">
                    </div>
                    <button id="login-btn" class="gradient-btn" style="width: 100%;">🚀 로그인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════
         메인 화면 (로그인 후 표시)
    ════════════════════════════════════════ -->
    <div id="main-frame" style="display: none;">
        <div class="main-container">

            <!-- 헤더 -->
            <div class="header">
                <h1>📚 English Learning Hub v.9 (updated 260322)</h1>
                <div class="user-info">
                    <span>👤 <span id="user-info"></span></span>
                    <button id="logout-btn" class="gradient-btn" style="padding: 10px 20px; font-size: 0.9rem;">로그아웃</button>
                </div>
            </div>

            <!-- 모드 탭 -->
            <div class="mode-tabs">
                <button id="input-mode-btn"   class="mode-tab active">📝 입력</button>
                <button id="study-mode-btn"   class="mode-tab">🧠 학습</button>
                <button id="reading-mode-btn" class="mode-tab">📖 읽기</button>
            </div>

            <!-- ── 1. 입력 모드 ── -->
            <div id="input-frame" class="content-section active">
                <div class="section-title">📝 문장 입력 및 관리</div>

                <div class="form-card">
                    <div class="form-group">
                        <label>영어 문장 또는 단어</label>
                        <input type="text" id="input-english" class="input-field" placeholder="여기에 영어 문장을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label>한국어 번역</label>
                        <input type="text" id="input-korean" class="input-field" placeholder="여기에 한국어 번역을 입력하세요">
                    </div>
                    <div class="button-group">
                        <button id="add-sentence-btn" class="gradient-btn success">✓ 저장하기</button>
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 40px;">저장된 문장 목록</h2>

                <!-- 스크롤 테이블 래퍼 -->
                <div class="table-wrapper">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <!-- 전체선택 체크박스 -->
                                    <th class="col-check">
                                        <input type="checkbox" id="check-all" class="row-checkbox" title="전체 선택">
                                    </th>
                                    <th style="width: 33%;">English</th>
                                    <th style="width: 28%;">Korean</th>
                                    <th>Date</th>
                                    <th>Study</th>
                                    <th>Correct</th>
                                    <th>Ratio</th>
                                    <th>Last Study</th>
                                </tr>
                            </thead>
                            <tbody id="sentence-list-body">
                                <tr>
                                    <td colspan="8" style="text-align:center; color:#999;">데이터를 불러오는 중...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 액션 바: 선택 건수 표시 + 수정/삭제 버튼 -->
                    <div class="list-action-bar">
                        <span class="selected-count" id="selected-count">선택된 항목: 0개</span>
                        <button id="edit-selected-btn"   class="btn-edit"   disabled>✏️ 수정</button>
                        <button id="delete-selected-btn" class="btn-danger"  disabled>🗑️ 삭제</button>
                    </div>
                </div>
            </div>

            <!-- ── 2. 학습 모드 ── -->

    <!-- ════════════════════════════════════════

    ════════════════════════════════════════ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,

        ────────────────────────────────────── */
        const firebaseConfig = {

            authDomain:        "flashcards-a103a.firebaseapp.com",
            projectId:         "flashcards-a103a",
            storageBucket:     "flashcards-a103a.firebasestorage.app",
            messagingSenderId: "450629867169",
            appId:             "1:450629867169:web:181cc1e74d26daffdac2e0"
        };

        /* ──────────────────────────────────────
           Firestore 경로 상수
           Rules: /artifacts/default-app-id/users/{userId}/sentences/{sentenceId}
           ※ APP_ID를 변경하면 경로도 자동으로 바뀝니다.
        ────────────────────────────────────── */
        const APP_ID = 'default-app-id';

        // 사용자 문서 경로: /artifacts/{APP_ID}/users/{userId}
        const getUserDocPath  = (uid) => doc(db, 'artifacts', APP_ID, 'users', uid);

        // 문장 컬렉션 경로: /artifacts/{APP_ID}/users/{userId}/sentences

        // 특정 문장 문서 경로: /artifacts/{APP_ID}/users/{userId}/sentences/{sentenceId}
        const getSentenceDoc  = (uid, sid) => doc(db, 'artifacts', APP_ID, 'users', uid, 'sentences', sid);

        /* ──────────────────────────────────────
           전역 상태 변수
        ────────────────────────────────────── */
        let app, db, auth;
        let userId            = null;
        let sentencesColRef   = null;   // 현재 로그인 유저의 sentences 컬렉션 참조
        let study_data        = [];     // Firestore에서 불러온 문장 배열
        let mode              = 'input';

        // 학습 모드 상태
        let current_question  = null;

        // 선택된 문장 ID 집합 (체크박스)
        let selectedIds = new Set();

        // 읽기 모드 상태
        let reading_list      = [];
        let current_read_index = 0;
        let is_playing        = false;
        let reading_speed     = 0.5;   // 0.3 빠르게 / 0.5 중간 / 0.8 느리게
        let readTimer         = null;
        let countdownTimer    = null;
        let countdown         = 0;

        /* ──────────────────────────────────────
           DOM 요소 참조 변수
        ────────────────────────────────────── */
        let authFrame, mainFrame;
        let signupEmail, signupPassword, signupBtn;
        let loginEmail, loginPassword, loginBtn;
        let logoutBtn, userInfoSpan;
        let modeButtons, inputFrame, studyFrame, readingFrame;
        let inputEnglish, inputKorean, addSentenceBtn;
        let sentenceListBody;
        let studyStatsOverall, questionKorean, userAnswerEntry;
        let resultFrame, resultLabel, correctAnswerLabel, userInputLabel, nextQuestionBtn;
        let speedSelect, readingDisplay, countdownDisplay, readingProgress, playBtn, stopBtn;
        let messageModal, messageTitle, messageText, messageCloseBtn;
        let checkAll, selectedCountEl, editSelectedBtn, deleteSelectedBtn;
        let editModal, editEnglish, editKorean, editSaveBtn, editCancelBtn;
        let editingId = null;   // 현재 수정 중인 문서 ID

        /* ══════════════════════════════════════
           초기화
        ══════════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', () => {
            bindDOMElements();
            setupEventListeners();
            initFirebase();
        });

        /* DOM 요소 바인딩 */
        function bindDOMElements() {
            authFrame    = document.getElementById('auth-frame');
            mainFrame    = document.getElementById('main-frame');

            signupEmail    = document.getElementById('signup-email');
            signupPassword = document.getElementById('signup-password');
            signupBtn      = document.getElementById('signup-btn');

            loginEmail    = document.getElementById('login-email');
            loginPassword = document.getElementById('login-password');
            loginBtn      = document.getElementById('login-btn');

            logoutBtn    = document.getElementById('logout-btn');
            userInfoSpan = document.getElementById('user-info');

            modeButtons = {
                input:   document.getElementById('input-mode-btn'),
                study:   document.getElementById('study-mode-btn'),

            };

            studyFrame   = document.getElementById('study-frame');
            readingFrame = document.getElementById('reading-frame');

            inputEnglish    = document.getElementById('input-english');
            inputKorean     = document.getElementById('input-korean');
            addSentenceBtn  = document.getElementById('add-sentence-btn');
            sentenceListBody = document.getElementById('sentence-list-body');

            studyStatsOverall  = document.getElementById('study-stats-overall');
            questionKorean     = document.getElementById('question-korean');
            userAnswerEntry    = document.getElementById('user-answer-entry');
            resultFrame        = document.getElementById('result-frame');
            resultLabel        = document.getElementById('result-label');
            correctAnswerLabel = document.getElementById('correct-answer-label');
            userInputLabel     = document.getElementById('user-input-label');
            nextQuestionBtn    = document.getElementById('next-question-btn');

            speedSelect      = document.getElementById('speed-select');
            readingDisplay   = document.getElementById('reading-display');
            countdownDisplay = document.getElementById('countdown-display');
            readingProgress  = document.getElementById('reading-progress');
            playBtn          = document.getElementById('play-btn');
            stopBtn          = document.getElementById('stop-btn');

            messageModal    = document.getElementById('message-modal');
            messageTitle    = document.getElementById('message-title');
            messageText     = document.getElementById('message-text');
            messageCloseBtn = document.getElementById('message-close-btn');

            // 목록 액션 바
            checkAll          = document.getElementById('check-all');
            selectedCountEl   = document.getElementById('selected-count');
            editSelectedBtn   = document.getElementById('edit-selected-btn');
            deleteSelectedBtn = document.getElementById('delete-selected-btn');

            // 수정 모달
            editModal      = document.getElementById('edit-modal');
            editEnglish    = document.getElementById('edit-english');
            editKorean     = document.getElementById('edit-korean');
            editSaveBtn    = document.getElementById('edit-save-btn');
            editCancelBtn  = document.getElementById('edit-cancel-btn');
        }

        /* 이벤트 리스너 등록 */
        function setupEventListeners() {
            // 인증
            signupBtn.addEventListener('click', handle_signup);
            loginBtn.addEventListener('click',  handle_login);
            logoutBtn.addEventListener('click', handle_logout);

            // 모드 탭
            modeButtons.input.addEventListener('click',   () => switchMode('input'));
            modeButtons.study.addEventListener('click',   () => switchMode('study'));
            modeButtons.reading.addEventListener('click', () => switchMode('reading'));

            // 문장 입력 (Enter 키 지원)
            inputEnglish.addEventListener('keypress', (e) => { if (e.key === 'Enter') addSentence(); });
            inputKorean.addEventListener('keypress',  (e) => { if (e.key === 'Enter') addSentence(); });
            addSentenceBtn.addEventListener('click', addSentence);

            // 학습 모드
            userAnswerEntry.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
            nextQuestionBtn.addEventListener('click', loadNextQuestion);

            // 읽기 모드
            speedSelect.addEventListener('change', (e) => {
                // 속도 값 매핑: 빠르게=0.3, 중간=0.5, 느리게=0.8
                reading_speed = e.target.value === '빠르게' ? 0.3
                              : e.target.value === '느리게' ? 0.8
                              : 0.5;
            });
            playBtn.addEventListener('click', startReading);
            stopBtn.addEventListener('click', stopReading);

            // 모달 닫기
            messageCloseBtn.addEventListener('click', () => {
                messageModal.classList.remove('active');
            });

            // 전체선택 체크박스
            checkAll.addEventListener('change', () => {
                const checked = checkAll.checked;
                document.querySelectorAll('.row-checkbox[data-id]').forEach(cb => {
                    cb.checked = checked;
                    const row = cb.closest('tr');
                    if (checked) {
                        selectedIds.add(cb.dataset.id);
                        row.classList.add('selected');
                    } else {
                        selectedIds.delete(cb.dataset.id);
                        row.classList.remove('selected');
                    }
                });
                updateActionBar();
            });

            // 삭제 버튼
            deleteSelectedBtn.addEventListener('click', deleteSelected);

            // 수정 버튼 (1개만 선택 시 활성화)
            editSelectedBtn.addEventListener('click', openEditModal);

            // 수정 모달 저장/취소
            editSaveBtn.addEventListener('click',   saveEdit);
            editCancelBtn.addEventListener('click', closeEditModal);

            // 수정 모달 Enter 키 저장
            editEnglish.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveEdit(); });
            editKorean.addEventListener('keypress',  (e) => { if (e.key === 'Enter') saveEdit(); });
        }

        /* Firebase 초기화 */
        function initFirebase() {
            app  = initializeApp(firebaseConfig);
            db   = getFirestore(app);
            auth = getAuth(app);

            // 인증 상태 감지: 로그인/로그아웃 시 자동 처리
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userId = user.uid;
                    userInfoSpan.textContent = user.email;

                    // ✅ 수정된 Firestore 경로 사용
                    sentencesColRef = getSentencesCol(userId);
                    loadSentences();

                    authFrame.style.display = 'none';
                    mainFrame.style.display = 'block';
                } else {
                    userId = null;
                    sentencesColRef = null;
                    authFrame.style.display = 'flex';
                    mainFrame.style.display = 'none';
                }
            });
        }

        /* ══════════════════════════════════════
           인증 함수
        ══════════════════════════════════════ */

        /* 회원가입 */
        async function handle_signup() {
            const email    = signupEmail.value.trim();
            const password = signupPassword.value.trim();

            if (!email || !password) {
                showMessage('알림', '이메일과 비밀번호를 입력해주세요.');
                return;
            }

            try {
                const credential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = credential.user.uid;

                // ✅ 수정된 경로: /artifacts/{APP_ID}/users/{uid}
                await setDoc(getUserDocPath(uid), {
                    email:      email,
                    created_at: new Date(),
                    updated_at: new Date()
                });

                showMessage('성공', '회원가입이 완료되었습니다!');
                signupEmail.value    = '';
                signupPassword.value = '';
            } catch (error) {
                showMessage('오류', error.message);
            }
        }

        /* 로그인 */
        async function handle_login() {
            const email    = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            if (!email || !password) {
                showMessage('알림', '이메일과 비밀번호를 입력해주세요.');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // 성공 시 onAuthStateChanged 가 자동으로 화면 전환 처리
            } catch (error) {
                showMessage('오류', error.message);
            }
        }

        /* 로그아웃 */
        async function handle_logout() {
            try {
                stopReading(); // 읽기 재생 중이면 정지
                await signOut(auth);
            } catch (error) {
                showMessage('오류', error.message);
            }
        }

        /* ══════════════════════════════════════
           모드 전환
        ══════════════════════════════════════ */
        function switchMode(newMode) {
            mode = newMode;

            // 모든 탭·섹션 비활성화
            document.querySelectorAll('.mode-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));

            if (newMode === 'input') {
                modeButtons.input.classList.add('active');
                inputFrame.classList.add('active');
            } else if (newMode === 'study') {
                modeButtons.study.classList.add('active');
                studyFrame.classList.add('active');
                loadNextQuestion();
            } else if (newMode === 'reading') {
                modeButtons.reading.classList.add('active');
                readingFrame.classList.add('active');
                prepareReadingList();
            }
        }

        /* ══════════════════════════════════════
           Firestore CRUD
        ══════════════════════════════════════ */

        /* 문장 추가 저장 */
        async function addSentence() {
            const english = inputEnglish.value.trim();
            const korean  = inputKorean.value.trim();

            if (!english) { showMessage('알림', '영어 문장을 입력해주세요.'); return; }
            if (!korean)  { showMessage('알림', '한국어 번역을 입력해주세요.'); return; }

            try {
                // ✅ sentencesColRef 는 올바른 경로로 초기화되어 있음
                await addDoc(sentencesColRef, {
                    english,
                    korean,
                    created_at:    new Date(),
                    study_count:   0,
                    correct_count: 0,
                    last_study:    null
                });

                inputEnglish.value = '';
                inputKorean.value  = '';
                showMessage('성공', '문장이 저장되었습니다!');
            } catch (error) {
                showMessage('오류', '저장 중 오류가 발생했습니다: ' + error.message);
            }
        }

        /* 실시간 문장 목록 구독 */
        function loadSentences() {
            onSnapshot(sentencesColRef, (snapshot) => {
                study_data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderSentenceList();
            });
        }

        /* ══════════════════════════════════════
           UI 렌더링
        ══════════════════════════════════════ */

        /* 문장 목록 테이블 렌더링
           - created_at 기준 최신순(내림차순) 정렬
           - 각 행에 체크박스 포함
        */
        function renderSentenceList() {
            // 선택 상태 초기화
            selectedIds.clear();
            updateActionBar();
            if (checkAll) checkAll.checked = false;

            if (study_data.length === 0) {
                sentenceListBody.innerHTML = `
                    <tr><td colspan="8" style="text-align:center; color:#999; padding:30px;">저장된 문장이 없습니다.</td></tr>`;
                return;
            }

            // 최신순 정렬: created_at 내림차순
            const sorted = [...study_data].sort((a, b) => {
                const ta = a.created_at ? a.created_at.toMillis() : 0;
                const tb = b.created_at ? b.created_at.toMillis() : 0;
                return tb - ta;
            });

            sentenceListBody.innerHTML = sorted.map(item => {
                const createdDate   = item.created_at ? new Date(item.created_at.toDate()).toLocaleDateString('ko-KR') : '-';
                const lastStudyDate = item.last_study  ? new Date(item.last_study.toDate()).toLocaleDateString('ko-KR')  : '-';
                const ratio         = item.study_count ? ((item.correct_count / item.study_count) * 100).toFixed(0) + '%' : '-';

                return `
                    <tr data-id="${item.id}">
                        <td class="col-check">
                            <input type="checkbox" class="row-checkbox" data-id="${item.id}">
                        </td>
                        <td>${item.english}</td>
                        <td>${item.korean}</td>
                        <td style="white-space:nowrap;">${createdDate}</td>
                        <td style="text-align:center;">${item.study_count   || 0}</td>
                        <td style="text-align:center;">${item.correct_count || 0}</td>
                        <td style="text-align:center;">${ratio}</td>
                        <td style="white-space:nowrap;">${lastStudyDate}</td>
                    </tr>`;
            }).join('');

            // 행 체크박스 이벤트 위임 방식으로 등록
            sentenceListBody.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    const row = cb.closest('tr');
                    if (cb.checked) {
                        selectedIds.add(cb.dataset.id);
                        row.classList.add('selected');
                    } else {
                        selectedIds.delete(cb.dataset.id);
                        row.classList.remove('selected');
                    }
                    // 전체선택 체크박스 상태 동기화
                    const allCbs = sentenceListBody.querySelectorAll('.row-checkbox');
                    checkAll.checked = [...allCbs].every(c => c.checked);
                    updateActionBar();
                });
            });
        }

        /* 액션 바 상태 갱신 (선택 건수, 버튼 활성화) */
        function updateActionBar() {
            const count = selectedIds.size;
            selectedCountEl.textContent = `선택된 항목: ${count}개`;

            // 삭제: 1개 이상 선택 시 활성화
            deleteSelectedBtn.disabled = count === 0;

            // 수정: 정확히 1개 선택 시만 활성화
            editSelectedBtn.disabled = count !== 1;
        }

        /* ══════════════════════════════════════
           목록 삭제 / 수정 기능
        ══════════════════════════════════════ */

        /* 선택된 항목 일괄 삭제 */
        async function deleteSelected() {
            if (selectedIds.size === 0) return;

            const count = selectedIds.size;
            if (!confirm(`선택한 ${count}개 문장을 삭제하시겠습니까?`)) return;

            try {
                // 선택된 ID 전체에 대해 deleteDoc 병렬 실행
                await Promise.all(
                    [...selectedIds].map(id => deleteDoc(getSentenceDoc(userId, id)))
                );
                selectedIds.clear();
                showMessage('완료', `${count}개 문장이 삭제되었습니다.`);
            } catch (error) {
                showMessage('오류', '삭제 중 오류가 발생했습니다: ' + error.message);
            }
        }

        /* 수정 모달 열기 (정확히 1개 선택된 경우) */
        function openEditModal() {
            if (selectedIds.size !== 1) return;

            editingId = [...selectedIds][0];
            const item = study_data.find(d => d.id === editingId);
            if (!item) return;

            // 기존 값을 모달 입력란에 채워넣기
            editEnglish.value = item.english;
            editKorean.value  = item.korean;
            editModal.classList.add('active');
            editEnglish.focus();
        }

        /* 수정 모달 닫기 */
        function closeEditModal() {
            editModal.classList.remove('active');
            editingId = null;
            editEnglish.value = '';
            editKorean.value  = '';
        }

        /* 수정 내용 Firestore에 저장 (기존 데이터 덮어쓰기) */
        async function saveEdit() {
            if (!editingId) return;

            const english = editEnglish.value.trim();
            const korean  = editKorean.value.trim();

            if (!english) { showMessage('알림', '영어 문장을 입력해주세요.'); return; }
            if (!korean)  { showMessage('알림', '한국어 번역을 입력해주세요.'); return; }

            try {
                // english, korean 필드만 덮어쓰기 (학습 통계는 유지)
                await updateDoc(getSentenceDoc(userId, editingId), {
                    english,
                    korean
                });
                closeEditModal();
                showMessage('완료', '문장이 수정되었습니다.');
            } catch (error) {
                showMessage('오류', '수정 중 오류가 발생했습니다: ' + error.message);
            }
        }

        /* 다음 문제 불러오기 (랜덤) */
        function loadNextQuestion() {
            if (study_data.length === 0) {
                showMessage('알림', '먼저 문장을 추가해주세요.');
                return;
            }

            current_question = study_data[Math.floor(Math.random() * study_data.length)];
            questionKorean.textContent  = current_question.korean;
            userAnswerEntry.value       = '';
            resultFrame.style.display   = 'none';

            // 진행률 표시
            const total   = study_data.length;
            const studied = study_data.filter(s => s.study_count > 0).length;
            studyStatsOverall.textContent = `진행률: ${studied} / ${total}`;
        }

        /* 정답 확인 */
        async function checkAnswer() {
            if (!current_question) return;

            const userAnswer    = userAnswerEntry.value.trim().toLowerCase();
            const correctAnswer = current_question.english.toLowerCase();
            const isCorrect     = userAnswer === correctAnswer;

            resultLabel.textContent        = isCorrect ? '✓ 정답!' : '✗ 오답';
            resultLabel.style.color        = isCorrect ? '#11998e' : '#fa709a';
            correctAnswerLabel.textContent = `정답: ${current_question.english}`;
            userInputLabel.textContent     = `입력: ${userAnswerEntry.value}`;
            resultFrame.style.display      = 'block';

            // Firestore 학습 통계 업데이트
            try {
                // ✅ 수정된 경로로 특정 문서 참조
                await updateDoc(getSentenceDoc(userId, current_question.id), {
                    study_count:   (current_question.study_count   || 0) + 1,
                    correct_count: (current_question.correct_count || 0) + (isCorrect ? 1 : 0),
                    last_study:    new Date()
                });
            } catch (error) {
                console.error('통계 업데이트 오류:', error);
            }
        }

        /* ══════════════════════════════════════
           읽기 모드
        ══════════════════════════════════════ */

        /* 읽기 목록 준비 */
        function prepareReadingList() {
            reading_list       = study_data.map(s => s.english);
            current_read_index = 0;
            updateReadingProgress();
        }

        /* 재생 시작 */
        function startReading() {
            if (reading_list.length === 0) {
                showMessage('알림', '먼저 문장을 추가해주세요.');
                return;
            }

            is_playing       = true;
            playBtn.disabled = true;
            stopBtn.disabled = false;
            readNextSentence();
        }

        /* 다음 문장 표시 */
        function readNextSentence() {
            if (!is_playing || current_read_index >= reading_list.length) {
                stopReading();
                return;
            }

            readingDisplay.textContent = reading_list[current_read_index];

            // 카운트다운 시작 (3 → 2 → 1)
            countdown = 3;
            updateCountdown();

            // 속도에 따라 다음 문장으로 넘어가는 딜레이 계산
            // reading_speed: 0.3(빠름)~0.8(느림) × 2000ms 기준
            const delay = (5 - reading_speed) * 2000;
            readTimer = setTimeout(() => {
                current_read_index++;
                updateReadingProgress();
                readNextSentence();
            }, delay);
        }

        /* 카운트다운 1초 단위 갱신 */
        function updateCountdown() {
            countdownDisplay.textContent = countdown > 0 ? countdown : '';
            if (countdown > 0) {
                countdown--;
                countdownTimer = setTimeout(updateCountdown, 1000);
            }
        }

        /* 진행률 텍스트 갱신 */
        function updateReadingProgress() {
            const total = reading_list.length;
            const current = Math.min(current_read_index + 1, total);
            readingProgress.textContent = `진행률: ${current} / ${total}`;
        }

        /* 재생 정지 */
        function stopReading() {
            is_playing       = false;
            playBtn.disabled = false;
            stopBtn.disabled = true;
            clearTimeout(readTimer);
            clearTimeout(countdownTimer);
            readingDisplay.textContent   = '';
            countdownDisplay.textContent = '';
        }

        /* ══════════════════════════════════════
           공통 유틸
        ══════════════════════════════════════ */

        /* 알림 모달 표시 */
        function showMessage(title, text) {
            messageTitle.textContent = title;
            messageText.textContent  = text;
            messageModal.classList.add('active');
        }

    </script>
</body>
</html>
